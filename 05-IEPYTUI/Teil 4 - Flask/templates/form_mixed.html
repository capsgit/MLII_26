<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Gemischtes Formular</title>
</head>
<body>

<div class="header">Gemischtes Formular</div>
<div class="content" >
    <form method="post" action="/mixed" enctype="multipart/form-data">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">


        <div class = "age">
          <label for="age">Alter:</label>
          <input type="number" id="age" name="age">
        </div>


        <div class = "gender">
          <label>Geschlecht:</label>
          <input type="radio" id="male" name="gender" value="male">
          <label for="male">Männlich</label>
          <input type="radio" id="female" name="gender" value="female">
          <label for="female">Weiblich</label>
        </div>


        <div>
          <label>Fähigkeiten:</label>
          <input type="checkbox" id="python" name="skills" value="Python">
          <label for="python">Python</label>
          <input type="checkbox" id="java" name="skills" value="Java">
          <label for="java">Java</label>
        </div>

        <div>
          <label for="resume">Lebenslauf hochladen:</label>
          <input type="file" id="resume" name="resume" required="True">
        </div>

        <button type="submit">Absenden</button>
    </form>
  </div>
</body>
</html>
