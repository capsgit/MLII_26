<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
</head>
<body>
  <h1>Productos</h1>
<ul>
  {% for product in products %}
  <li>
    <strong>{{ product.name }}</strong>: {{ product.price }} €
  </li>
  {% else %}
    <li>No hay productos</li>
  {% endfor %}
</ul>
</body>
</html>
